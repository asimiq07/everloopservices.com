<!DOCTYPE html>
<html>
<head>
  <title>EverLoop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #000;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      color: white;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav {
      display: flex;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
      font-size: 15px;
    }

    .join-btn {
      margin-left: 30px;
      padding: 10px 22px;
      background: white;
      color: black;
      border-radius: 25px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s;
    }

    .join-btn:hover {
      background: #e5e5e5;
    }

    /* HERO (POSTER STYLE) */
    .hero {
      height: 90vh;
      background: 
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url('https://images.unsplash.com/photo-1584622650111-993a426fbf0a');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      padding: 0 40px;
      color: white;
    }

    .hero-content {
      max-width: 600px;
    }

    .hero h1 {
      font-size: 60px;
      margin-bottom: 20px;
      line-height: 1.1;
    }

    .hero p {
      font-size: 20px;
      margin-bottom: 25px;
      color: #eaeaea;
    }

    .btn {
      padding: 14px 30px;
      background: white;
      color: black;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #ddd;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    /* PRICING */
    .pricing {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid black;
      width: 260px;
    }

    .highlight {
      background: black;
      color: white;
    }

    /* FORM */
    .form-container {
      max-width: 500px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid black;
    }

    button {
      background: black;
      color: white;
      padding: 14px;
      border: none;
      width: 100%;
      border-radius: 30px;
    }

    footer {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }

  </style>
</head>

<body>

<header>
  <div class="logo">
    ∞ EVERLOOP
  </div>

  <nav>
    <a href="#how">How It Works</a>
    <a href="#pricing">Pricing</a>
    <a href="#contact">Contact</a>
    <a href="#contact" class="join-btn">Join Now</a>
  </nav>
</header>

<!-- HERO POSTER -->
<div class="hero">
  <div class="hero-content">
    <h1>Never clean your washroom again.</h1>
    <p>Your washroom. On autopilot.</p>
    <a href="#contact" class="btn">Join the waitlist</a>
  </div>
</div>

<section>
  <div class="container">
    <h2>Simple Pricing</h2>
    <p>Weekly cleaning subscription</p>

    <div class="pricing">
      <div class="card highlight">
        <h3>$120/month</h3>
        <p>First washroom</p>
      </div>

      <div class="card">
        <h3>+$30</h3>
        <p>Each additional</p>
      </div>
    </div>
  </div>
</section>

<section id="contact">
  <h2>Join Waitlist</h2>

  <div class="form-container">
    <form action="https://formspree.io/f/mdaykqog" method="POST">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Phone" required>
      <button type="submit">Submit</button>
    </form>
  </div>
</section>

<footer>
  EverLoop © 2026
</footer>

</body>
</html>
