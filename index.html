<!DOCTYPE html>
<html>
<head>
  <title>EverLoop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #1f3a5f;
    }

    header {
      background: #1f3a5f;
      color: white;
      padding: 18px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    nav a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
    }

    /* 🔥 HERO SECTION UPGRADED */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 140px 60px;
      background: linear-gradient(to right, #ffffff, #eef3f9);
      gap: 60px;
      flex-wrap: wrap;
    }

    .hero-text {
      max-width: 520px;
    }

    .hero h1 {
      font-size: 56px;
      margin-bottom: 15px;
      line-height: 1.1;
    }

    .hero p {
      font-size: 18px;
      color: #555;
    }

    /* 🔥 BIGGER PREMIUM IMAGE */
    .hero img {
      width: 560px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
      transform: scale(1.03);
    }

    .btn {
      margin-top: 25px;
      padding: 14px 30px;
      background: #1f3a5f;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      font-weight: 500;
    }

    section {
      padding: 90px 20px;
      text-align: center;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    /* 🔥 FIXED CONTENT ALIGNMENT */
    .container {
      max-width: 800px;
      margin: auto;
      text-align: left;
    }

    .steps {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .step {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 260px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .pricing {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 280px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      font-size: 20px;
    }

    .highlight {
      background: #1f3a5f;
      color: white;
      transform: scale(1.05);
    }

    .dark-section {
      background: #1f3a5f;
      color: white;
    }

    .cta {
      background: #e8eef6;
      padding: 80px 20px;
      text-align: center;
    }

    .form-container {
      max-width: 500px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }
