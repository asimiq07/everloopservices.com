<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhaaga Collections</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8f8f8;
}

.header {
  height: 70vh;
  background: url('images/Headder.webp') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.header h1 {
  font-size: 48px;
  background: rgba(0,0,0,0.4);
  padding: 10px 20px;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.card h3 {
  margin: 10px;
}

.price {
  color: #555;
  margin-bottom: 10px;
}

button {
  background: #1e3a5f;
  color: white;
  border: none;
  padding: 10px;
  width: 90%;
  margin: 10px;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #16324d;
}

.footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>

<body>

<div class="header">
  <h1>Dhaaga</h1>
</div>

<div class="section">
  <h2>Our Collection</h2>
</div>

<div class="products">

  <div class="card">
    <img src="images/Pink1.webp">
    <h3>Pink Floral Kurti</h3>
    <div class="price">$45</div>
    <button>Order Now</button>
  </div>

  <div class="card">
    <img src="images/Orange1.webp">
    <h3>Orange Chikankari Kurti</h3>
    <div class="price">$50</div>
    <button>Order Now</button>
  </div>

  <div class="card">
    <img src="images/Green1.webp">
    <h3>Green Elegant Kurti</h3>
    <div class="price">$48</div>
    <button>Order Now</button>
  </div>

  <div class="card">
    <img src="images/Down.webp">
    <h3>Classic Handwork Kurti</h3>
    <div class="price">$52</div>
    <button>Order Now</button>
  </div>

</div>

<div class="footer">
  © Dhaaga Collections
</div>

</body>
</html>
