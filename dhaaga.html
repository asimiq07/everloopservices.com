<!DOCTYPE html>
<html>
<head>
  <title>Dhaaga Collections</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background: #fafafa;
      color: #222;
    }

    header {
      padding: 25px 60px;
      background: white;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
    }

    .logo {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px 60px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .hero p {
      color: #666;
      font-size: 18px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 40px;
      padding: 60px;
    }

    .product {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      transition: 0.3s;
    }

    .product:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    .product img {
      width: 100%;
      height: 360px;
      object-fit: cover;
    }

    .product-info {
      padding: 18px;
    }

    .product h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
    }

    .price {
      margin: 8px 0;
      font-size: 16px;
      color: #444;
    }

    .sizes {
      font-size: 13px;
      color: #777;
      margin-bottom: 12px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 12px;
      background: #1f3a5f;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Dhaaga Collections</div>
</header>

<div class="hero">
  <h1>Dhaaga</h1>
  <p>Elegant ethnic wear for everyday style</p>
</div>

<div class="products">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1602810319428-019690571b5b">
    <div class="product-info">
      <h3>Chikankari Kurti</h3>
      <div class="price">$35</div>
      <div class="sizes">Sizes: S / M / L</div>
      <a href="https://wa.me/1234567890" class="btn">Order Now</a>
    </div>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c">
    <div class="product-info">
      <h3>Kurti Set</h3>
      <div class="price">$55</div>
      <div class="sizes">Sizes: S / M / L</div>
      <a href="https://wa.me/1234567890" class="btn">Order Now</a>
    </div>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1622470953794-aa9c70b0fb9d">
    <div class="product-info">
      <h3>Casual Kurta</h3>
      <div class="price">$40</div>
      <div class="sizes">Sizes: S / M / L</div>
      <a href="https://wa.me/1234567890" class="btn">Order Now</a>
    </div>
  </div>

</div>

<footer>
  © Dhaaga Collections
</footer>

</body>
</html>
